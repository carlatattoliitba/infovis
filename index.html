<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de InfoVis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container, .flourish-container, .datawrapper-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 60px;
        }
        /* Ajuste para que el SVG sea interactivo y tenga tooltips */
        object {
            width: 100%;
            height: 700px; 
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: white;
        }
        h1 {
            padding-bottom: 10px;
            width: 100%;
            border: none; /* Quitamos la raya gris oscura */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RawGraph</h1>
        <object data="viz.svg" type="image/svg+xml">
            Tu navegador no soporta visualización de SVG interactivos.
        </object>
    </div>

    <div class="flourish-container">
        <h1>Flourish Chart</h1>
        <div class="flourish-embed flourish-chart" data-src="visualisation/27939085">
            <script src="https://public.flourish.studio/resources/embed.js"></script>
            <noscript>
                <img src="https://public.flourish.studio/visualisation/27939085/thumbnail" width="100%" alt="visualization" />
            </noscript>
        </div>
    </div>

    <div class="datawrapper-container">
        <h1>Pizza Topping Choices</h1>
        <iframe title="Men vs Women: Pizza Topping Choices" aria-label="Range Plot" id="datawrapper-chart-8qk1U" src="https://datawrapper.dwcdn.net/8qk1U/1/" scrolling="no" frameborder="0" style="width: 0; min-width: 100% !important; border: none;" height="456" data-external="1"></iframe>
        <script type="text/javascript">
            window.addEventListener("message", function(a) {
                if (void 0 !== a.data["datawrapper-height"]) {
                    var e = document.querySelectorAll("iframe");
                    for (var t in a.data["datawrapper-height"])
                        for (var r, i = 0; r = e[i]; i++)
                            if (r.contentWindow === a.source) {
                                var d = a.data["datawrapper-height"][t] + "px";
                                r.style.height = d
                            }
                }
            });
        </script>
    </div>

</body>
</html>
