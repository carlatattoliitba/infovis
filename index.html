<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de InfoVis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 50px;
        }
        /* Ajuste para el objeto SVG interactivo sugerido por tu profesor */
        object {
            width: 100%;
            height: 700px; /* Ajustamos la altura para que el diagrama de flujos entre cómodo */
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: white;
        }
        h1 {
            /* Eliminamos el border-bottom para sacar la raya oscura definitivamente */
            padding-bottom: 10px;
            width: 100%;
        }
        .flourish-container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RawGraph</h1>
        <object data="viz.svg" type="image/svg+xml">
            Tu navegador no soporta visualización de SVG interactivos.
        </object>
    </div>

    <div class="flourish-container">
        <h1>Flourish Chart</h1>
        <div class="flourish-embed flourish-chart" data-src="visualisation/27939085">
            <script src="https://public.flourish.studio/resources/embed.js"></script>
            <noscript>
                <img src="https://public.flourish.studio/visualisation/27939085/thumbnail" width="100%" alt="visualization" />
            </noscript>
        </div>
    </div>

</body>
</html>
